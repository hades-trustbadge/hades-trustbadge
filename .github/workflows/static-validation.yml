name: Static Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate static Game Boy project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check required project files
        run: |
          test -f index.html
          test -f README.md

      - name: Check essential HTML metadata
        run: |
          grep -Eiq '<!DOCTYPE html>' index.html
          grep -Eiq '<html[^>]+lang=' index.html
          grep -Eiq '<meta[^>]+charset=' index.html
          grep -Eiq '<meta[^>]+name="viewport"' index.html
          grep -Eiq '<title>[^<]+</title>' index.html

      - name: Check inline JavaScript syntax
        run: |
          python3 - <<'PY'
          import re
          import subprocess
          from pathlib import Path

          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>', html, flags=re.IGNORECASE | re.DOTALL)

          if not scripts:
              print('No inline JavaScript blocks found. Skipping syntax check.')
              raise SystemExit(0)

          checked = 0
          for index, script in enumerate(scripts, start=1):
              script = script.strip()
              if not script:
                  continue

              path = Path(f'/tmp/inline-script-{index}.js')
              path.write_text(script, encoding='utf-8')
              subprocess.run(['node', '--check', str(path)], check=True)
              checked += 1

          print(f'Validated {checked} inline JavaScript block(s).')
          PY

      - name: Report validation result
        run: |
          echo 'Static validation completed successfully.'
          echo 'Core files, HTML metadata, and inline JavaScript syntax were checked.'
